<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔢 Redondeadores</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --p1:#FF6B6B; --p2:#4ECDC4; --p3:#FFE66D; --p4:#A8E6CF;
    --card:rgba(255,255,255,0.07);
    --purple:#7B2FBE; --gold:#f9ca24; --white:#ffffff;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Nunito',sans-serif;
    background:#1a1a2e;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.6) 0%,transparent 100%),
      radial-gradient(1px 1px at 60% 10%,rgba(255,255,255,.5) 0%,transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 50%,rgba(255,255,255,.4) 0%,transparent 100%),
      radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.6) 0%,transparent 100%),
      radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,.5) 0%,transparent 100%),
      radial-gradient(1px 1px at 90% 20%,rgba(255,255,255,.4) 0%,transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 85%,rgba(255,255,255,.5) 0%,transparent 100%),
      radial-gradient(1px 1px at 30% 50%,rgba(255,255,255,.3) 0%,transparent 100%),
      radial-gradient(1px 1px at 70% 65%,rgba(255,255,255,.4) 0%,transparent 100%),
      radial-gradient(1px 1px at 15% 45%,rgba(255,255,255,.5) 0%,transparent 100%);
    pointer-events:none; z-index:0;
  }
  .orb { position:fixed; border-radius:50%; filter:blur(60px); opacity:.15; pointer-events:none; z-index:0; animation:floatOrb 8s ease-in-out infinite; }
  .orb1 { width:300px;height:300px;background:#7B2FBE;top:-100px;left:-100px;animation-delay:0s; }
  .orb2 { width:250px;height:250px;background:#FF6B6B;bottom:-80px;right:-80px;animation-delay:3s; }
  .orb3 { width:200px;height:200px;background:#4ECDC4;top:40%;left:60%;animation-delay:5s; }
  @keyframes floatOrb { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,30px) scale(1.1)} }

  #app { position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;padding-top:70px; }

  /* TOP BAR */
  .topbar {
    position:fixed; top:0;left:0;right:0;
    display:flex; justify-content:flex-end; align-items:center; gap:10px;
    padding:10px 16px; z-index:100;
    background:rgba(26,26,46,.9); backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .topbar button {
    border:none; cursor:pointer; font-family:'Nunito',sans-serif;
    font-weight:700; font-size:13px; border-radius:20px; padding:8px 16px;
    transition:all .2s; display:flex; align-items:center; gap:6px;
  }
  .btn-musica { background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.2)!important; }
  .btn-fin { background:rgba(255,107,107,.25); color:#FF6B6B; border:1px solid rgba(255,107,107,.4)!important; }

  /* PANTALLAS */
  .pantalla { width:100%; max-width:420px; text-align:center; animation:aparecer .5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes aparecer { from{opacity:0;transform:translateY(30px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }

  .logo {
    font-family:'Fredoka One',cursive; font-size:46px;
    background:linear-gradient(135deg,#FFE66D,#FF6B6B,#4ECDC4);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:4px; line-height:1.1;
  }
  .logo-sub { font-size:14px;color:rgba(255,255,255,.55);margin-bottom:2rem;font-weight:600;letter-spacing:2px;text-transform:uppercase; }
  .jug-label { font-size:17px;font-weight:700;color:rgba(255,255,255,.8);margin-bottom:1rem; }
  .jugador-grid { display:flex;gap:14px;justify-content:center;margin-bottom:2rem; }
  .jbtn {
    width:68px;height:68px; border-radius:50%;
    border:3px solid rgba(255,255,255,.2); background:rgba(255,255,255,.07);
    font-size:26px; font-family:'Fredoka One',cursive; color:#fff; cursor:pointer;
    transition:all .25s cubic-bezier(.34,1.56,.64,1);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
  }
  .jbtn:active { transform:scale(.95); }
  .jbtn.sel1 { border-color:var(--p1);background:rgba(255,107,107,.25);transform:scale(1.15);box-shadow:0 0 24px rgba(255,107,107,.4); }
  .jbtn.sel2 { border-color:var(--p2);background:rgba(78,205,196,.25);transform:scale(1.15);box-shadow:0 0 24px rgba(78,205,196,.4); }
  .jbtn.sel3 { border-color:var(--p3);background:rgba(255,230,109,.25);transform:scale(1.15);box-shadow:0 0 24px rgba(255,230,109,.4); }
  .jbtn.sel4 { border-color:var(--p4);background:rgba(168,230,207,.25);transform:scale(1.15);box-shadow:0 0 24px rgba(168,230,207,.4); }
  .jbtn-emoji { font-size:22px;line-height:1; }
  .jbtn-num { font-size:13px;font-weight:700;opacity:.7;font-family:'Nunito',sans-serif; }
  .btn-start {
    font-family:'Fredoka One',cursive; font-size:22px; padding:15px 44px;
    border:none; border-radius:50px; background:linear-gradient(135deg,#7B2FBE,#4ECDC4);
    color:#fff; cursor:pointer; transition:all .25s; box-shadow:0 8px 32px rgba(123,47,190,.4);
  }
  .btn-start:active { transform:scale(.97); }
  .btn-start:disabled { opacity:.3; cursor:not-allowed; }

  /* TURNO */
  .turno-card { background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:1.2rem 1.5rem;margin-bottom:1.2rem;backdrop-filter:blur(10px); }
  .turno-jugador-nombre { font-family:'Fredoka One',cursive;font-size:24px;margin-bottom:3px; }
  .turno-meta { font-size:12px;color:rgba(255,255,255,.5);font-weight:600; }
  .nivel-pill { display:inline-block;padding:5px 18px;border-radius:30px;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.85); }
  .numero-display {
    font-family:'Fredoka One',cursive; font-size:68px; line-height:1;
    margin:.6rem 0 .4rem;
    background:linear-gradient(135deg,#FFE66D,#FF6B6B);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation:pulso 2s ease-in-out infinite;
  }
  @keyframes pulso { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  .pregunta-txt { font-size:15px;color:rgba(255,255,255,.65);margin-bottom:1rem;font-weight:600; }

  /* PANTALLA RESPUESTA */
  .resp-display {
    font-family:'Fredoka One',cursive; font-size:48px;
    background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.25);
    border-radius:16px; padding:10px 20px; margin:0 auto 1rem;
    min-width:160px; display:inline-block; letter-spacing:2px;
    color:#fff; min-height:72px; line-height:1.3;
    transition:border-color .2s;
  }
  .resp-display.activo { border-color:var(--p2); box-shadow:0 0 20px rgba(78,205,196,.3); }
  .resp-display.vacio { color:rgba(255,255,255,.3); font-size:28px; line-height:2.2; }

  /* TECLADO NUMÉRICO */
  .teclado {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:10px; max-width:300px; margin:0 auto;
  }
  .tkey {
    font-family:'Fredoka One',cursive; font-size:26px;
    padding:0; height:64px; border:none; border-radius:16px;
    background:rgba(255,255,255,.1); color:#fff; cursor:pointer;
    transition:all .15s; display:flex; align-items:center; justify-content:center;
    border:1.5px solid rgba(255,255,255,.15);
    user-select:none; -webkit-user-select:none;
    position:relative; overflow:hidden;
  }
  .tkey:active { transform:scale(.92); background:rgba(255,255,255,.22); }
  .tkey.punto { font-size:36px; padding-bottom:6px; }
  .tkey.borrar { font-size:22px; background:rgba(255,107,107,.15); border-color:rgba(255,107,107,.3); }
  .tkey.borrar:active { background:rgba(255,107,107,.35); }
  .tkey.ok-key {
    grid-column:1/-1; height:60px; font-size:22px;
    background:linear-gradient(135deg,#4ECDC4,#7B2FBE);
    border:none; border-radius:16px;
    box-shadow:0 4px 20px rgba(78,205,196,.35);
    letter-spacing:1px;
  }
  .tkey.ok-key:active { transform:scale(.97); }
  .tkey.ok-key:disabled { opacity:.35; cursor:not-allowed; }
  .tkey.punto-oculto { visibility:hidden; }

  /* FEEDBACK */
  .feedback { font-family:'Fredoka One',cursive;font-size:20px;padding:10px 24px;border-radius:14px;display:inline-block;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);margin-bottom:.8rem; }
  @keyframes popIn { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
  .ok-fb { background:rgba(168,230,207,.2);color:#A8E6CF;border:1px solid rgba(168,230,207,.3); }
  .mal-fb { background:rgba(255,107,107,.2);color:#FF6B6B;border:1px solid rgba(255,107,107,.3); }

  /* PROGRESO */
  .prog-bar-wrap { margin-top:1rem;display:flex;align-items:center;gap:10px;justify-content:center; }
  .prog-bar-bg { flex:1;max-width:260px;height:8px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden; }
  .prog-bar-fill { height:100%;border-radius:10px;background:linear-gradient(90deg,#7B2FBE,#4ECDC4);transition:width .5s ease; }
  .prog-txt { font-size:12px;color:rgba(255,255,255,.45);font-weight:700;white-space:nowrap; }

  /* MARCADOR LATERAL */
  .marcador-lateral { position:fixed;left:8px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:50; }
  .marc-item { background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:6px 10px;text-align:center;min-width:52px;backdrop-filter:blur(6px);transition:all .3s; }
  .marc-item.activo { border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.14);transform:scale(1.08); }
  .marc-emoji { font-size:18px;line-height:1; }
  .marc-nombre { font-size:9px;font-weight:700;color:rgba(255,255,255,.5);margin-top:2px; }
  .marc-puntos { font-family:'Fredoka One',cursive;font-size:18px; }

  /* FINAL */
  .final-card { background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:1.8rem;backdrop-filter:blur(12px); }
  .final-titulo { font-family:'Fredoka One',cursive;font-size:36px;background:linear-gradient(135deg,#FFE66D,#FF6B6B,#4ECDC4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem; }
  .podio { display:flex;justify-content:center;align-items:flex-end;gap:10px;margin:1.2rem 0; }
  .podio-item { display:flex;flex-direction:column;align-items:center;gap:5px; }
  .podio-emoji { font-size:28px; }
  .podio-nombre { font-size:12px;font-weight:800;color:rgba(255,255,255,.75); }
  .podio-pts { font-family:'Fredoka One',cursive;font-size:17px; }
  .podio-barra { width:46px;border-radius:8px 8px 0 0;background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(255,255,255,.1));border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px; }
  .podio-item.primero .podio-barra { background:linear-gradient(180deg,rgba(249,202,36,.5),rgba(249,202,36,.15));border-color:rgba(249,202,36,.5); }
  .podio-item.primero .podio-emoji { font-size:36px; }
  .btn-restart { font-family:'Fredoka One',cursive;font-size:20px;padding:14px 44px;border:none;border-radius:50px;background:linear-gradient(135deg,#FF6B6B,#7B2FBE);color:#fff;cursor:pointer;margin-top:1.2rem;box-shadow:0 8px 28px rgba(255,107,107,.35); }
  .btn-restart:active { transform:scale(.97); }

  /* FX */
  .nota { position:fixed;font-size:22px;animation:subirNota 3s ease-out forwards;pointer-events:none;z-index:200;opacity:.8; }
  @keyframes subirNota { 0%{opacity:.8;transform:translateY(0) rotate(0deg) scale(1)} 100%{opacity:0;transform:translateY(-180px) rotate(20deg) scale(.5)} }
  .confeti { position:fixed;width:10px;height:10px;border-radius:2px;animation:caerConfeti 2.5s ease-in forwards;pointer-events:none;z-index:200; }
  @keyframes caerConfeti { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

  /* RIPPLE en teclas */
  .ripple { position:absolute;border-radius:50%;background:rgba(255,255,255,.35);transform:scale(0);animation:ripp .4s linear;pointer-events:none; }
  @keyframes ripp { to{transform:scale(4);opacity:0} }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="topbar" id="topbar" style="display:none">
  <button class="btn-musica" id="btnMusica" onclick="toggleMusica()">🎵 Música: ON</button>
  <button class="btn-fin" onclick="finalizarPartida()">🏁 Finalizar</button>
</div>

<div class="marcador-lateral" id="marcador" style="display:none"></div>
<div id="app"><div id="pantalla"></div></div>

<script>
const EMOJIS  = ['🐶','🐱','🦊','🐸'];
const COLORES = ['#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF'];
const NOMBRES = ['Jugador 1','Jugador 2','Jugador 3','Jugador 4'];

let numJugadores=0, puntos=[], turnos=[], turnoIdx=0;
let audioCtx=null, musicaOn=true, gainMaster=null;
let valorActual = '';

// ————— AUDIO —————
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainMaster = audioCtx.createGain();
  gainMaster.gain.value = 0.18;
  gainMaster.connect(audioCtx.destination);
  tocarMusica();
}
function tocarMusica() {
  if (!audioCtx || !musicaOn) return;
  const notas = [261.63,293.66,329.63,392.00,440.00,392.00,349.23,329.63,293.66,261.63];
  const durs  = [0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.3,0.6];
  let t = audioCtx.currentTime;
  const loop = () => {
    if (!musicaOn) return;
    let dur=0;
    notas.forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0,t+dur); g.gain.linearRampToValueAtTime(.5,t+dur+.02); g.gain.linearRampToValueAtTime(0,t+dur+durs[i]-.05);
      o.connect(g); g.connect(gainMaster); o.start(t+dur); o.stop(t+dur+durs[i]); dur+=durs[i];
    });
    const bajoF=[130.81,130.81,164.81,164.81,130.81,130.81,174.61,130.81];
    const bajoD=[0.4,0.4,0.4,0.4,0.4,0.4,0.4,0.4];
    let tb=0;
    bajoF.forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='triangle'; o.frequency.value=f;
      g.gain.setValueAtTime(0,t+tb); g.gain.linearRampToValueAtTime(.25,t+tb+.03); g.gain.linearRampToValueAtTime(0,t+tb+bajoD[i]-.08);
      o.connect(g); g.connect(gainMaster); o.start(t+tb); o.stop(t+tb+bajoD[i]); tb+=bajoD[i];
    });
    setTimeout(loop, dur*1000-100);
  };
  loop();
}
function toggleMusica() {
  musicaOn=!musicaOn;
  document.getElementById('btnMusica').textContent=musicaOn?'🎵 Música: ON':'🔇 Música: OFF';
  if (gainMaster) gainMaster.gain.value=musicaOn?.18:0;
  if (musicaOn && audioCtx) tocarMusica();
}
function beep(freqs, tipo) {
  if (!audioCtx||!musicaOn) return;
  freqs.forEach((f,i)=>{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.frequency.value=f; o.type=tipo||'sine';
    const t=audioCtx.currentTime+i*.12;
    g.gain.setValueAtTime(.4,t); g.gain.linearRampToValueAtTime(0,t+.25);
    o.connect(g); g.connect(gainMaster); o.start(t); o.stop(t+.3);
  });
}
function sonidoCorrecto() { beep([523.25,659.25,783.99],'sine'); }
function sonidoError()    { beep([220,196],'sawtooth'); }
function sonidoTecla()    { if(!audioCtx||!musicaOn) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.08,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.05);o.connect(g);g.connect(gainMaster);o.start();o.stop(audioCtx.currentTime+.06); }
function sonidoFanfare()  { if(!audioCtx||!musicaOn) return; [523.25,659.25,783.99,1046.5,783.99,1046.5].forEach((f,i)=>{ const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=f;o.type='square';const t=audioCtx.currentTime+i*.18;g.gain.setValueAtTime(.15,t);g.gain.linearRampToValueAtTime(0,t+.25);o.connect(g);g.connect(gainMaster);o.start(t);o.stop(t+.3); }); }

// ————— JUEGO —————
function generarNumero(nivel) {
  let n=Math.floor(Math.random()*8)+1;
  let d=Array.from({length:nivel},()=>Math.floor(Math.random()*9)+1).join('');
  return parseFloat(n+'.'+d);
}
function aproximar(num, nivel) {
  let s=num.toFixed(nivel), [ent,dec]=s.split('.'), digs=dec.split('').map(Number);
  if (nivel===1) return digs[0]>=5?String(parseInt(ent)+1):ent;
  let carry=digs[nivel-1]>=5?1:0, res=[];
  for (let i=nivel-2;i>=0;i--) { let v=digs[i]+carry;carry=v>=10?1:0;res[i]=v%10; }
  return (parseInt(ent)+carry)+'.'+res.slice(0,nivel-1).join('');
}

function mostrarInicio() {
  numJugadores=0;
  document.getElementById('topbar').style.display='none';
  document.getElementById('marcador').style.display='none';
  document.getElementById('pantalla').innerHTML=`
    <div class="pantalla">
      <div class="logo">🔢 Redondeadores</div>
      <div class="logo-sub">El juego de los decimales</div>
      <div class="jug-label">¿Cuántos jugadores?</div>
      <div class="jugador-grid">
        ${[1,2,3,4].map(n=>`
          <button class="jbtn" id="jb${n}" onclick="selJug(${n})">
            <span class="jbtn-emoji">${EMOJIS[n-1]}</span>
            <span class="jbtn-num">${n}</span>
          </button>`).join('')}
      </div>
      <button class="btn-start" id="btnStart" disabled onclick="iniciar()">🚀 ¡Empezar!</button>
    </div>`;
}

function selJug(n) {
  initAudio();
  numJugadores=n;
  [1,2,3,4].forEach(i=>{ document.getElementById('jb'+i).className='jbtn'+(i===n?' sel'+n:''); });
  document.getElementById('btnStart').disabled=false;
  lanzarNotas(3);
}

function iniciar() {
  puntos=Array(numJugadores).fill(0);
  turnos=[];
  [[1,4],[2,3],[3,3],[4,2]].forEach(([niv,rondas])=>{
    for (let r=0;r<rondas;r++)
      for (let j=0;j<numJugadores;j++)
        turnos.push({jugador:j,nivel:niv,num:generarNumero(niv)});
  });
  turnoIdx=0;
  document.getElementById('topbar').style.display='flex';
  actualizarMarcador(-1);
  mostrarTurno();
}

function actualizarMarcador(activo) {
  const m=document.getElementById('marcador');
  if (numJugadores===0){m.style.display='none';return;}
  m.style.display='flex';
  m.innerHTML=puntos.slice(0,numJugadores).map((p,i)=>`
    <div class="marc-item ${i===activo?'activo':''}" style="border-color:${i===activo?COLORES[i]:'rgba(255,255,255,.1)'}">
      <div class="marc-emoji">${EMOJIS[i]}</div>
      <div class="marc-nombre">J${i+1}</div>
      <div class="marc-puntos" style="color:${COLORES[i]}">${p}</div>
    </div>`).join('');
}

function mostrarTurno() {
  if (turnoIdx>=turnos.length){mostrarFinal();return;}
  valorActual='';
  const t=turnos[turnoIdx];
  const desc=['','Al entero','A 1 decimal','A 2 decimales','A 3 decimales'][t.nivel];
  const correc=aproximar(t.num,t.nivel);
  const pct=Math.round(turnoIdx/turnos.length*100);
  const necesitaPunto = t.nivel>1;
  actualizarMarcador(t.jugador);

  // Construir teclado: 1-9, punto/vacío, 0, borrar, OK
  const teclas = [
    {v:'1',l:'1'},{v:'2',l:'2'},{v:'3',l:'3'},
    {v:'4',l:'4'},{v:'5',l:'5'},{v:'6',l:'6'},
    {v:'7',l:'7'},{v:'8',l:'8'},{v:'9',l:'9'},
    necesitaPunto?{v:'.',l:'.',cls:'punto'}:{v:'',l:'',cls:'punto-oculto'},
    {v:'0',l:'0'},
    {v:'⌫',l:'⌫',cls:'borrar'},
  ];

  document.getElementById('pantalla').innerHTML=`
    <div class="pantalla">
      <div class="turno-card" style="border-color:${COLORES[t.jugador]}33;box-shadow:0 0 30px ${COLORES[t.jugador]}22">
        <div class="turno-jugador-nombre" style="color:${COLORES[t.jugador]}">${EMOJIS[t.jugador]} ${NOMBRES[t.jugador]}</div>
        <div class="turno-meta">Turno ${turnoIdx+1} de ${turnos.length}</div>
      </div>
      <div><span class="nivel-pill">⭐ Nivel ${t.nivel} — ${desc}</span></div>
      <div class="numero-display">${t.num.toFixed(t.nivel)}</div>
      <div class="pregunta-txt">Redondea este número ↑</div>
      <div id="fb"></div>
      <div class="resp-display vacio" id="respDisplay">?</div>
      <div class="teclado">
        ${teclas.map(k=>k.v===''?`<button class="tkey ${k.cls||''}" disabled style="visibility:hidden"></button>`:`
          <button class="tkey ${k.cls||''}" id="tecla_${k.v==='.'?'punto':k.v==='⌫'?'borrar':k.v}"
            onclick="pulsarTecla('${k.v}','${correc}',${t.nivel})" onmousedown="ripple(event)">
            ${k.l}
          </button>`).join('')}
        <button class="tkey ok-key" id="btnOk" onclick="comprobar('${correc}')" disabled>
          ✓ Confirmar
        </button>
      </div>
      <div class="prog-bar-wrap">
        <span class="prog-txt">0%</span>
        <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
        <span class="prog-txt">100%</span>
      </div>
    </div>`;
}

function pulsarTecla(v, correc, nivel) {
  sonidoTecla();
  if (v==='⌫') {
    valorActual=valorActual.slice(0,-1);
  } else if (v==='.') {
    if (!valorActual.includes('.') && valorActual.length>0) valorActual+='.';
  } else {
    // Limitar longitud según nivel
    const maxLen = nivel===1?2: nivel+3;
    if (valorActual.length<maxLen) valorActual+=v;
  }
  actualizarDisplay();
}

function actualizarDisplay() {
  const d=document.getElementById('respDisplay');
  const btn=document.getElementById('btnOk');
  if (!d) return;
  if (valorActual==='') {
    d.textContent='?'; d.className='resp-display vacio';
    if(btn) btn.disabled=true;
  } else {
    d.textContent=valorActual; d.className='resp-display activo';
    if(btn) btn.disabled=false;
  }
}

function comprobar(correc) {
  const val=valorActual.trim();
  if (!val) return;
  const ok=val===String(correc);
  const fb=document.getElementById('fb');
  if (ok) {
    puntos[turnos[turnoIdx].jugador]++;
    fb.innerHTML=`<div class="feedback ok-fb">🎉 ¡Correcto! = ${correc}</div>`;
    sonidoCorrecto(); lanzarNotas(5);
    actualizarMarcador(turnos[turnoIdx].jugador);
  } else {
    fb.innerHTML=`<div class="feedback mal-fb">❌ Era ${correc} — ¡ánimo!</div>`;
    sonidoError();
  }
  // Deshabilitar teclado
  document.querySelectorAll('.tkey').forEach(b=>b.disabled=true);
  setTimeout(()=>{ turnoIdx++; mostrarTurno(); }, 1700);
}

function finalizarPartida(){mostrarFinal(true);}

function mostrarFinal(anticipado) {
  document.getElementById('topbar').style.display='none';
  document.getElementById('marcador').style.display='none';
  sonidoFanfare(); lanzarConfeti();
  const sorted=puntos.slice(0,numJugadores).map((p,i)=>({i,p})).sort((a,b)=>b.p-a.p);
  const maxP=sorted[0].p;
  const alts=[100,70,55,45], pCls=['primero','segundo','tercero','cuarto'], medallas=['🥇','🥈','🥉','4️⃣'];
  const titulo=sorted.filter(x=>x.p===maxP).length>1?'¡Empate! 🤝':`¡Gana ${NOMBRES[sorted[0].i]}! 🎉`;
  document.getElementById('pantalla').innerHTML=`
    <div class="pantalla">
      <div class="final-card">
        <div class="final-titulo">${titulo}</div>
        <div style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:.5rem;">${anticipado?'Partida finalizada antes de tiempo':'¡Completasteis todas las rondas!'}</div>
        <div class="podio">
          ${sorted.map((x,r)=>`
            <div class="podio-item ${pCls[r]}">
              <div class="podio-emoji">${EMOJIS[x.i]}</div>
              <div class="podio-nombre">${NOMBRES[x.i]}</div>
              <div class="podio-pts" style="color:${COLORES[x.i]}">${x.p} pts</div>
              <div class="podio-barra" style="height:${alts[r]}px">${medallas[r]}</div>
            </div>`).join('')}
        </div>
        <button class="btn-restart" onclick="mostrarInicio()">🔄 Jugar otra vez</button>
      </div>
    </div>`;
}

// ————— FX —————
function ripple(e) {
  const btn=e.currentTarget;
  const r=document.createElement('span');
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.className='ripple';
  r.style.width=r.style.height=size+'px';
  r.style.left=(e.clientX-rect.left-size/2)+'px';
  r.style.top=(e.clientY-rect.top-size/2)+'px';
  btn.appendChild(r);
  setTimeout(()=>r.remove(),500);
}
function lanzarNotas(n) {
  const ns=['♩','♪','♫','♬'];
  for (let i=0;i<n;i++) setTimeout(()=>{
    const el=document.createElement('div');
    el.className='nota';
    el.textContent=ns[Math.floor(Math.random()*ns.length)];
    el.style.left=(20+Math.random()*60)+'vw';
    el.style.bottom='20vh';
    el.style.color=COLORES[Math.floor(Math.random()*COLORES.length)];
    el.style.animationDuration=(2+Math.random())+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  },i*120);
}
function lanzarConfeti() {
  for (let i=0;i<60;i++) setTimeout(()=>{
    const el=document.createElement('div');
    el.className='confeti';
    el.style.left=(Math.random()*100)+'vw';
    el.style.top='-10px';
    el.style.background=COLORES[Math.floor(Math.random()*COLORES.length)];
    el.style.animationDuration=(1.5+Math.random()*1.5)+'s';
    el.style.animationDelay=(Math.random()*.8)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  },i*30);
}

mostrarInicio();
</script>
</body>
